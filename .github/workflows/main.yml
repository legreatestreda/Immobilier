name: Extraction Agences Immobilières

on:
  schedule:
    - cron: '0 0 1 * *' # Tourne le 1er de chaque mois
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run extraction script
        run: python extract_agencies.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add agences_independantes_france.csv
          git commit -m "Mise à jour de la liste des agences immobilières" || echo "Pas de changements"
          git push
