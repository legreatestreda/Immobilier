name: Extraction Agences Immobilières

on:
  schedule:
    - cron: '0 0 1 * *' # Tourne le 1er de chaque mois
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # actions/checkout@v3 -> SHA correspondant à la v3.5.3
        uses: actions/checkout@8f4b7f84864484a7bf31766abe9204da3cbe65b3 

      - name: Set up Python
        # actions/setup-python@v4 -> SHA correspondant à la v4.7.0
        uses: actions/setup-python@61a6322f88396a6271a6ee3565807d608ee5593f 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run extraction script
        run: python extract_agencies.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add agences_independantes_france.csv
          git commit -m "Mise à jour de la liste des agences immobilières" || echo "Pas de changements"
          git push
          
